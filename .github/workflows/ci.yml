name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools setuptools-scm
          pip install .[all]
          pip install pytest 
          
      - name: Install ruff for linting
        run: |
          pip install ruff

      - name: Run ruff linter
        run: |
          ruff check .

      - name: Run tests
        run: |
          python tools/run_pytest.py

  base-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-base-smoke-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-base-smoke-

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools setuptools-scm
          pip install .
          pip install pytest

      - name: Smoke import base package
        run: |
          python -c "import neuro_py; import neuro_py.ensemble.decoding; from neuro_py.ensemble.decoding.bayesian import decode"

      - name: Run plain pytest smoke checks
        run: |
          pytest tests/util/test_lazy_loading.py tests/ensemble/decoding/test_optional_dl_dependencies.py -q

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-typecheck-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-typecheck-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools setuptools-scm
          pip install .[all]
          pip install pytest ty

      - name: Run ty
        run: |
          ty check --python "$(python -c 'import sys; print(sys.prefix)')"
